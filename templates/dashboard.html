{% extends "base.html" %}{% block title %}Dashboard{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-speedometer2"></i> Dashboard</h2>
<div class="row">
    <div class="col-xl-3 col-md-6"><div class="card bg-primary text-white"><div class="card-body"><h6>TOTAL STUDENTS</h6><h2>{{ total_students }}</h2></div></div></div>
    <div class="col-xl-3 col-md-6"><div class="card bg-success text-white"><div class="card-body"><h6>O-LEVEL</h6><h2>{{ o_level }}</h2></div></div></div>
    <div class="col-xl-3 col-md-6"><div class="card bg-info text-white"><div class="card-body"><h6>A-LEVEL</h6><h2>{{ a_level }}</h2></div></div></div>
    <div class="col-xl-3 col-md-6"><div class="card bg-warning text-white"><div class="card-body"><h6>EXAMS</h6><h2>{{ total_exams }}</h2></div></div></div>
</div>
<div class="row mt-4">
    <div class="col-md-8"><div class="card"><div class="card-header"><h5>Class Distribution</h5></div><div class="card-body"><canvas id="classChart" height="300"></canvas></div></div></div>
    <div class="col-md-4"><div class="card"><div class="card-header"><h5>Gender</h5></div><div class="card-body"><canvas id="genderChart" height="300"></canvas></div></div></div>
</div>
{% endblock %}
{% block scripts %}
<script>
new Chart(document.getElementById('classChart'),{type:'bar',data:{labels:[{% for c,n in class_stats.items() %}'{{c}}',{% endfor %}],datasets:[{label:'Students',data:[{% for c,n in class_stats.items() %}{{n}},{% endfor %}],backgroundColor:'#003366'}]}});
new Chart(document.getElementById('genderChart'),{type:'doughnut',data:{labels:['Male','Female'],datasets:[{data:[{{male}},{{female}}],backgroundColor:['#003366','#FF69B4']}]}});
</script>
{% endblock %}
