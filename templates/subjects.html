{% extends "base.html" %}{% block title %}Subjects{% endblock %}
{% block content %}
<div class="row mb-4"><div class="col-md-8"><h3><i class="bi bi-book-fill"></i> School Subjects</h3></div><div class="col-md-4 text-end"><button class="btn btn-success" onclick="initSubjects()"><i class="bi bi-database-add"></i> Initialize NECTA Subjects</button></div></div>
<div class="card"><div class="card-body"><table class="table table-striped" id="subjectsTable">
<thead><tr><th>Code</th><th>Short</th><th>Subject Name</th><th>Level</th><th>Category</th></tr></thead>
<tbody>{% for s in subjects %}<tr><td><strong>{{s.code}}</strong></td><td><span class="badge bg-dark">{{s.short_code}}</span></td><td>{{s.name}}</td><td><span class="badge {% if s.level=='O-LEVEL' %}bg-primary{% else %}bg-success{% endif %}">{{s.level}}</span></td><td><span class="badge bg-info">{{s.category}}</span></td></tr>{% endfor %}</tbody>
</table></div></div>
{% endblock %}
{% block scripts %}<script>$(document).ready(function(){$('#subjectsTable').DataTable();});function initSubjects(){if(confirm('Initialize all NECTA subjects?')){$.ajax({url:'/api/subjects/initialize',method:'POST',success:function(r){alert(r.message);location.reload();}});}}</script>{% endblock %}
